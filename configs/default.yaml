model:
  weights: yolov8s.pt
  imgsz: 640
  conf: 0.35
  iou: 0.5
  half: true          # FP16
  trt: true           # export + use TensorRT engine when available
  device: 0
  dog_class_id: 16    # COCO class index for 'dog'

tracker:
  type: bytetrack     # ultralytics-supported: bytetrack | botsort
  cfg: bytetrack.yaml

pipeline:
  queue_maxlen: 4
  drop_policy: oldest

analytics:
  window_frames: 30   # recompute cuDF aggregates every N frames
  ring_capacity: 54000  # ~30 min at 30 FPS single stream
  hist_bins: 16
  parquet_flush_every: 9000  # rows

output:
  display: true
  save_video: true
  video_path: out/annotated.mp4
  detections_path: out/detections.parquet
  analytics_path: out/analytics_window.json

reconnect:
  max_backoff_s: 30
